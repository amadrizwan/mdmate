name: Build & Upload

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
          - os: ubuntu-latest
            script: dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build:asciiflow
      - run: npm run ${{ matrix.script }} -- --publish never

      - name: Ad-hoc sign and repackage macOS DMGs
        if: runner.os == 'macOS'
        run: |
          # Sign both x64 and arm64 app bundles
          for app in dist/mac/mdmate.app dist/mac-arm64/mdmate.app; do
            [ -d "$app" ] || continue
            codesign --force --deep --sign - "$app"
          done
          # Remove original DMGs and recreate with signed apps
          rm -f dist/*.dmg dist/*.blockmap
          VERSION=$(node -p "require('./package.json').version")
          hdiutil create -volname "mdmate" -srcfolder dist/mac -ov -format UDZO "dist/mdmate-${VERSION}.dmg"
          hdiutil create -volname "mdmate" -srcfolder dist/mac-arm64 -ov -format UDZO "dist/mdmate-${VERSION}-arm64.dmg"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          fail_on_unmatched_files: false
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
